<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Mes de las Madres - PROYECTOVISION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1, #f06292);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Pétalos ── */
        .petal {
            position: fixed;
            width: 20px; height: 20px;
            background: radial-gradient(ellipse, #f8bbd0, #e91e63);
            border-radius: 50% 0 50% 50%;
            opacity: 0.6;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0%   { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
        }
        .petal:nth-child(1)  { left: 5%;  animation-duration: 8s;  animation-delay: 0s;  width: 15px; height: 15px; }
        .petal:nth-child(2)  { left: 15%; animation-duration: 10s; animation-delay: 1s;  width: 18px; height: 18px; }
        .petal:nth-child(3)  { left: 25%; animation-duration: 9s;  animation-delay: 2s; }
        .petal:nth-child(4)  { left: 35%; animation-duration: 11s; animation-delay: 0.5s; width: 12px; height: 12px; }
        .petal:nth-child(5)  { left: 45%; animation-duration: 7s;  animation-delay: 3s; }
        .petal:nth-child(6)  { left: 55%; animation-duration: 12s; animation-delay: 1.5s; width: 22px; height: 22px; }
        .petal:nth-child(7)  { left: 65%; animation-duration: 8s;  animation-delay: 2.5s; }
        .petal:nth-child(8)  { left: 75%; animation-duration: 10s; animation-delay: 0.8s; width: 16px; height: 16px; }
        .petal:nth-child(9)  { left: 85%; animation-duration: 9s;  animation-delay: 3.5s; }
        .petal:nth-child(10) { left: 92%; animation-duration: 11s; animation-delay: 1.2s; width: 14px; height: 14px; }

        .heart-float {
            position: fixed;
            font-size: 20px;
            opacity: 0.4;
            pointer-events: none;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
        .heart-float:nth-of-type(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .heart-float:nth-of-type(2) { left: 30%; animation-duration: 14s; animation-delay: 2s; }
        .heart-float:nth-of-type(3) { left: 50%; animation-duration: 10s; animation-delay: 4s; }
        .heart-float:nth-of-type(4) { left: 70%; animation-duration: 13s; animation-delay: 1s; }
        .heart-float:nth-of-type(5) { left: 88%; animation-duration: 11s; animation-delay: 3s; }
        .heart-float:nth-of-type(6) { left: 20%; animation-duration: 15s; animation-delay: 5s; }
        .heart-float:nth-of-type(7) { left: 60%; animation-duration: 9s;  animation-delay: 6s; }
        .heart-float:nth-of-type(8) { left: 40%; animation-duration: 16s; animation-delay: 2.5s; }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            max-width: 800px;
            width: 95%;
        }

        .company-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #880e4f;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 5px;
            animation: fadeInDown 1s ease;
        }
        .company-name span {
            display: inline-block;
            font-weight: 700;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, #880e4f, #c2185b, #e91e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 7vw, 5rem);
            color: #880e4f;
            margin: 15px 0;
            text-shadow: 2px 2px 8px rgba(136,14,79,0.2);
            animation: fadeInUp 1.2s ease;
            line-height: 1.2;
        }
        .main-title .highlight {
            color: #c2185b;
            font-size: 1.1em;
        }

        .floral-divider { font-size: 2rem; margin: 10px 0; animation: fadeIn 1.5s ease; }
        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: #ad1457;
            font-weight: 300;
            margin-bottom: 30px;
            animation: fadeIn 1.8s ease;
        }

        /* ── Contenedor mensaje ── */
        .message-container {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px 35px;
            margin: 20px auto;
            max-width: 600px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(136,14,79,0.15), 0 5px 15px rgba(0,0,0,0.08);
            border: 2px solid rgba(233,30,99,0.15);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        .message-container::before {
            content: '❝';
            position: absolute; top: 5px; left: 15px;
            font-size: 3rem; color: rgba(233,30,99,0.15); font-family: serif;
        }
        .message-container::after {
            content: '❞';
            position: absolute; bottom: -10px; right: 15px;
            font-size: 3rem; color: rgba(233,30,99,0.15); font-family: serif;
        }
        .message-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(136,14,79,0.2);
        }
        .message-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            color: #6a1b4d;
            line-height: 1.6;
            font-style: italic;
            transition: all 0.5s ease;
        }
        .message-text.animate { animation: messageAppear 0.8s ease; }
        @keyframes messageAppear {
            0%   { opacity: 0; transform: translateY(20px) scale(0.95); }
            50%  { transform: translateY(-5px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Botón Rosa ── */
        .rose-button-wrapper {
            margin: 35px auto 20px;
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .rose-button {
            position: relative;
            border: none; background: none; cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 8px 20px rgba(233,30,99,0.4));
        }
        .rose-button:hover { transform: scale(1.1); }
        .rose-button:active { transform: scale(0.95); }
        .rose-svg { width: 120px; height: 120px; }
        .rose-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem; color: #880e4f;
            font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; margin-top: 10px;
            display: block; animation: pulse 2s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.05); }
        }

        .glow-ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 2px solid rgba(233,30,99,0.3);
            animation: glowPulse 2s ease infinite;
            pointer-events: none;
        }
        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.5; }
            50%      { transform: translate(-50%,-50%) scale(1.3); opacity: 0;   }
        }

        /* ── Botones de acción ── */
        .action-buttons {
            display: none;
            justify-content: center;
            gap: 15px;
            margin: 10px auto 20px;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease;
        }
        .action-buttons.visible { display: flex; }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-print {
            background: linear-gradient(135deg, #c2185b, #e91e63);
            color: white;
            box-shadow: 0 6px 20px rgba(194,24,91,0.4);
        }
        .btn-print:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(194,24,91,0.5);
        }
        .btn-print:active { transform: translateY(0); }

        .btn-new {
            background: linear-gradient(135deg, #f06292, #f48fb1);
            color: white;
            box-shadow: 0 6px 20px rgba(240,98,146,0.35);
        }
        .btn-new:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(240,98,146,0.45);
        }
        .btn-new:active { transform: translateY(0); }

        .btn-icon { font-size: 1.2rem; }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #ad1457;
            opacity: 0.6;
            letter-spacing: 3px;
        }

        /* ── Corazón explosión ── */
        .heart-burst {
            position: fixed; pointer-events: none;
            font-size: 1.5rem;
            animation: burst 1s ease forwards;
            z-index: 100;
        }
        @keyframes burst {
            0%   { opacity: 1; transform: translate(0,0) scale(0.5); }
            100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(1.5) rotate(360deg); }
        }

        .sparkle {
            position: fixed; width: 6px; height: 6px;
            background: #fff; border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 1.5s ease forwards;
        }
        @keyframes sparkleAnim {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @media (max-width: 480px) {
            .rose-svg { width: 100px; height: 100px; }
            .message-container { padding: 25px 20px; }
            .btn-action { padding: 10px 20px; font-size: 0.8rem; }
        }
    </style>
</head>

            printWindow.onload = function() {
                setTimeout(() => {
                    printWindow.focus();
                    printWindow.print();
                }, 800);

                    printWindow.focus();
                    printWindow.print();
                } catch(e) {}
            }, 2000);

        function createHeartBurst() {
            const button = document.getElementById('roseButton');
            const rect = button.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const emojis = ['💖','💕','🌹','💗','🌸','✨','💝','🌺','💐','🌷'];

            for (let i = 0; i < 12; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-burst';
                heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                const angle = (Math.PI * 2 * i) / 12;
                const dist = 60 + Math.random() * 80;
                heart.style.left = centerX + 'px';
                heart.style.top = centerY + 'px';
                heart.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                heart.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        }

        function createSparkles() {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const s = document.createElement('div');
                    s.className = 'sparkle';
                    s.style.left = Math.random() * window.innerWidth + 'px';
                    s.style.top = Math.random() * window.innerHeight + 'px';
                    const size = 4 + Math.random() * 6;
                    s.style.width = size + 'px';
                    s.style.height = size + 'px';
                    document.body.appendChild(s);
                    setTimeout(() => s.remove(), 1500);
                }, i * 100);
            }
        }

        document.getElementById('messageText').style.transition = 'all 0.3s ease';
    </script>
